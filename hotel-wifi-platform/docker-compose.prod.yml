version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hotel-wifi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: HotelWifi@2026
      MYSQL_DATABASE: hotel_wifi
      MYSQL_USER: hotelwifi
      MYSQL_PASSWORD: HotelWifi@2026
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --innodb-buffer-pool-size=64M
      - --max-connections=100
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pHotelWifi@2026"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384M

  redis:
    image: redis:7-alpine
    container_name: hotel-wifi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  hotel-wifi-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: hotel-wifi-api:latest
    container_name: hotel-wifi-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hotel_wifi?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: hotelwifi
      SPRING_DATASOURCE_PASSWORD: HotelWifi@2026
      SPRING_DATA_REDIS_HOST: redis
      SPRING_FLYWAY_ENABLED: true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mysql_data:
  redis_data:
  api_logs:
