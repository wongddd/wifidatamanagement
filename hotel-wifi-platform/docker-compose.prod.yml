version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hotel-wifi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-SecureRoot@2026!}
      MYSQL_DATABASE: hotel_wifi
      MYSQL_USER: hotelwifi
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-SecureApp@2026!}
      TZ: Asia/Shanghai
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --innodb-buffer-pool-size=64M
      - --max-connections=100
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-SecureRoot@2026!}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384M

  redis:
    image: redis:7-alpine
    container_name: hotel-wifi-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-RedisWifi@2026.Secure}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-RedisWifi@2026.Secure}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  hotel-wifi-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: hotel-wifi-api:latest
    container_name: hotel-wifi-api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
      JWT_SECRET: ${JWT_SECRET:-Xk9mP3vL7sR2nQ8wY5aB1cD4eF6gH0jIkLmNpQsTuVwXyZ}
      SPRING_DATASOURCE_USERNAME: hotelwifi
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-SecureApp@2026!}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-RedisWifi@2026.Secure}
      SPRING_FLYWAY_ENABLED: true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: hotel-wifi-nginx:latest
    container_name: hotel-wifi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - hotel-wifi-api
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  mysql_data:
  redis_data:
  api_logs: