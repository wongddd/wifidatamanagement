server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/hotel_wifi?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:hotelwifi}
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  flyway:
    enabled: true
    validate-on-migrate: false
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

logging:
  level:
    com.alenwifidata: INFO
    org.springframework.security: WARN
