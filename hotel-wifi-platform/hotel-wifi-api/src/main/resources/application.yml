server:
  port: 8080

spring:
  application:
    name: hotel-wifi-platform
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/hotel_wifi?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# SpringDoc / Knife4j
springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs

# JWT 配置
jwt:
  secret: Jw2qF8vL9xMzN4pR6sT7uVwXyZ1aB3cD5eF8gH0iJkLmNoPqRsTuVwXyZ
  expiration: 86400000  # 24 小时

# MikroTik 默认配置
mikrotik:
  default-port: 8728
  connect-timeout: 10000
  read-timeout: 30000

# 计费配置
billing:
  poll-interval-seconds: 30     # 流量采集间隔
  deduct-interval-seconds: 60   # 扣费间隔
  prepaid-amount: 0.5           # 首次预扣费金额（元）

logging:
  level:
    com.alenwifidata: DEBUG
    org.springframework.security: INFO
